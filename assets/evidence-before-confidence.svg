<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Evidence before confidence</title>
  <desc id="desc">Labeeb's engineering approach: ground, constrain, verify, and measure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#10253a"/>
      <stop offset="1" stop-color="#0c1728"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#33d6c5"/>
      <stop offset="1" stop-color="#66a7ff"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8fb8d8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)"/>
  <circle cx="1080" cy="70" r="150" fill="#33d6c5" fill-opacity="0.05"/>
  <circle cx="1110" cy="300" r="210" fill="#66a7ff" fill-opacity="0.05"/>

  <rect x="72" y="58" width="74" height="6" rx="3" fill="url(#accent)" filter="url(#glow)"/>
  <text x="72" y="120" fill="#f5fbff" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="1">EVIDENCE BEFORE CONFIDENCE</text>
  <text x="74" y="166" fill="#a9c3d9" font-family="Segoe UI, Arial, sans-serif" font-size="22">Local AI, constrained agents, and hardware workflows with proof attached.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">
    <rect x="74" y="226" width="190" height="58" rx="14" fill="#102f3b" stroke="#33d6c5" stroke-opacity="0.65"/>
    <text x="169" y="261" fill="#d9fffa" text-anchor="middle">01  GROUND</text>

    <path d="M280 255 H326" stroke="#6d96b5" stroke-width="2"/>
    <path d="M320 249 L328 255 L320 261" fill="none" stroke="#6d96b5" stroke-width="2"/>

    <rect x="342" y="226" width="190" height="58" rx="14" fill="#112b43" stroke="#55b8e8" stroke-opacity="0.65"/>
    <text x="437" y="261" fill="#e2f5ff" text-anchor="middle">02  CONSTRAIN</text>

    <path d="M548 255 H594" stroke="#6d96b5" stroke-width="2"/>
    <path d="M588 249 L596 255 L588 261" fill="none" stroke="#6d96b5" stroke-width="2"/>

    <rect x="610" y="226" width="190" height="58" rx="14" fill="#152844" stroke="#779bff" stroke-opacity="0.65"/>
    <text x="705" y="261" fill="#e9edff" text-anchor="middle">03  VERIFY</text>

    <path d="M816 255 H862" stroke="#6d96b5" stroke-width="2"/>
    <path d="M856 249 L864 255 L856 261" fill="none" stroke="#6d96b5" stroke-width="2"/>

    <rect x="878" y="226" width="190" height="58" rx="14" fill="#1a2540" stroke="#9c8cff" stroke-opacity="0.65"/>
    <text x="973" y="261" fill="#f0ecff" text-anchor="middle">04  MEASURE</text>
  </g>

  <text x="74" y="326" fill="#7895ad" font-family="Consolas, monospace" font-size="14">AI: source → grounded answer    •    RTL: golden model → checked behaviour</text>
</svg>
